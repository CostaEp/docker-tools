services:
  mobydock:
    build:
      context: .
      dockerfile: Dockerfile
    image: docker-tools-mobydock:2.2.0
    container_name: mobydock
    ports:
      - "9090:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - mobydock_data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Microservice health & isolation labels
      - SERVICE_NAME=mobydock-core
      - DB_PATH=/app/data/store.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      # Future K8s migration labels (matches Deployment selector pattern)
      com.mobydock.component: "core"
      com.mobydock.version: "2.2.0"
      com.mobydock.managed-by: "docker-compose"

volumes:
  mobydock_data:
    driver: local
    labels:
      com.mobydock.purpose: "persistent-store"
