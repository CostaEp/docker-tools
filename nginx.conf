worker_processes auto;

events {
  worker_connections 1024;
}

http {
  # Docker internal DNS resolver — enables dynamic resolution so Nginx never crashes on backend restarts
  resolver 127.0.0.11 valid=10s ipv6=off;

  # ── WebSocket upgrade map ─────────────────────────────────────────────
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 80;
    server_name _;

    # ── Buffer sizes for large API responses ───────────────────────────
    proxy_buffer_size          128k;
    proxy_buffers              4 256k;
    proxy_busy_buffers_size    256k;
    client_max_body_size       50m;

    # ── Common proxy headers ──────────────────────────────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── Terminal WebSocket (/socket.io/) → mobydock-terminal ──────────
    location /socket.io/ {
      set $target_terminal http://mobydock-terminal:3004;
      proxy_pass $target_terminal;
      proxy_http_version 1.1;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    # ── QA Scoring & Telemetry → mobydock-qa ─────────────────────────
    location /api/qa/ {
      set $target_qa http://mobydock-qa:3002;
      proxy_pass $target_qa;
      proxy_read_timeout 60s;
    }

    # ── File Explorer & Permissions → mobydock-files ──────────────────
    location /api/files/ {
      set $target_files http://mobydock-files:3003;
      proxy_pass $target_files;
      proxy_read_timeout 60s;
    }

    # ── All other API + Static UI → mobydock-core ─────────────────────
    location / {
      set $target_core http://mobydock-core:3001;
      proxy_pass $target_core;
      proxy_read_timeout 120s;
    }
  }
}
