worker_processes auto;

events {
  worker_connections 1024;
}

http {
  # ── Upstream microservices ────────────────────────────────────────────
  upstream mobydock_core {
    server mobydock-core:3001;
  }
  upstream mobydock_qa {
    server mobydock-qa:3002;
  }
  upstream mobydock_files {
    server mobydock-files:3003;
  }
  upstream mobydock_terminal {
    server mobydock-terminal:3004;
  }

  # ── WebSocket upgrade map ─────────────────────────────────────────────
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 80;
    server_name _;

    # ── Increase buffer sizes for large API responses ─────────────────
    proxy_buffer_size          128k;
    proxy_buffers              4 256k;
    proxy_busy_buffers_size    256k;
    client_max_body_size       50m;

    # ── Common proxy headers ──────────────────────────────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── Terminal WebSocket (/socket.io/) → mobydock-terminal ──────────
    location /socket.io/ {
      proxy_pass http://mobydock_terminal;
      proxy_http_version 1.1;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    # ── QA Scoring & Telemetry → mobydock-qa ─────────────────────────
    location /api/qa/ {
      proxy_pass http://mobydock_qa;
      proxy_read_timeout 60s;
    }

    # ── File Explorer & Permissions → mobydock-files ──────────────────
    location /api/files/ {
      proxy_pass http://mobydock_files;
      proxy_read_timeout 60s;
    }

    # ── All other API + Static UI → mobydock-core ─────────────────────
    location / {
      proxy_pass http://mobydock_core;
      proxy_read_timeout 120s;
    }
  }
}
